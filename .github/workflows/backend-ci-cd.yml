name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: production-backend
  ASG_NAME: production-backend-asg
  ALB_DNS: production-alb-644936730.us-east-1.elb.amazonaws.com

jobs:
  test:
    name: Test and Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.mod

      - name: Run tests
        working-directory: backend
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Check code formatting
        working-directory: backend
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run gofmt -s -w ."
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        working-directory: backend
        run: go vet ./...

      - name: Vulnerability scan
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }}

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG="${{ github.sha }}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $IMAGE_TAG"

      - name: Build Docker image
        working-directory: backend
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build \
            --tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }} \
            --tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Scan Docker image for vulnerabilities
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

      - name: Push Docker image to ECR
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          echo "Pushed: $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}"

  deploy:
    name: Deploy to EC2 via Rolling Update
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger rolling update
        run: |
          chmod +x scripts/deploy-backend.sh
          ./scripts/deploy-backend.sh ${{ env.ASG_NAME }} ${{ env.AWS_REGION }}

      - name: Run smoke tests
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh ${{ env.ALB_DNS }}

      - name: Deployment summary
        run: |
          echo "✅ Backend deployed successfully!"
          echo "🔖 Image tag: ${{ needs.build.outputs.image_tag }}"
          echo "🌍 ALB: http://${{ env.ALB_DNS }}"
